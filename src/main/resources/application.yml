spring:
  application:
    name: monthley

  jpa:
    hibernate:
      # WAJIB 'validate' — Flyway yang memiliki skema, bukan Hibernate.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: Asia/Kuala_Lumpur
        # Envers — audit trail untuk data kewangan
        integration.envers.enabled: false
        org.hibernate.envers.audit_table_suffix: _aud

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  modulith:
    events:
      # false: Modulith membaca event_publication semasa startup, SEBELUM
      # Flyway sempat menciptanya -> boot gagal atas DB kosong. Ia "berjaya"
      # sebelum ini hanya kerana table sudah wujud dari larian terdahulu.
      # Kita tidak menggunakan event Modulith buat masa ini (tiada
      # @ApplicationModuleListener / publishEvent dalam kod). Hidupkan semula
      # bila event digunakan DAN turutan bean diselesaikan.
      republish-outstanding-events-on-restart: false
      completion-mode: update   # simpan rekod selesai untuk audit

server:
  port: 8080

logging:
  level:
    com.monthley: INFO


# ====================== MONTHLEY ======================
monthley:
  app-url: ${MONTHLEY_APP_URL:http://localhost:4200}
  jwt:
    secret: ${MONTHLEY_JWT_SECRET:monthley-dev-secret-key-change-in-production-min-32-chars}
    ttl-hours: 12
  email:
    # Kunci Resend — dari env sahaja. JANGAN commit kunci sebenar.
    resend-key: ${MONTHLEY_RESEND_KEY:}
    from: ${MONTHLEY_EMAIL_FROM:Monthley <onboarding@resend.dev>}

---
# ====================== DEV (MySQL 9 local) ======================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/monthley_new?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Kuala_Lumpur
    username: monthley
    password: devpass
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    com.monthley: DEBUG
    org.hibernate.SQL: DEBUG

---
# ====================== PROD (MariaDB) ======================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
